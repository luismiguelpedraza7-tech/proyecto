<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Tienda</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main>
    <div id="pantalla-login">
      <div class="login-ring-container">
        <div class="animated-ring"></div>
        <div class="login-card">
          <h1>Bienvenido</h1>
          <input type="email" id="inputEmailLogin" placeholder="Email" autocomplete="email">
          <input type="password" id="inputPasswordLogin" placeholder="Contraseña" autocomplete="current-password">
          
          <button type="button" class="btn-auth" id="btnIniciarSesionLogin">Iniciar Sesión</button>
          <button type="button" class="btn-auth" id="btnRegistrarseLogin">Crear Cuenta</button>
          
          <button type="button" class="btn-auth" id="btnGoogle" style="background-color: #4285F4; color: white; margin-top: 10px;">
            Entrar con Google
          </button>

          <p id="authMessageLogin" class="auth-message"></p>
        </div>
      </div>
    </div>

    <div id="pantalla-registro" style="display: none;">
      <div class="login-card">
        <h1>Registro</h1>
        <form id="registroForm">
          <input type="email" id="regEmail" placeholder="Email" autocomplete="email">
          <input type="password" id="regPassword" placeholder="Contraseña" autocomplete="new-password">
          <button type="submit" class="btn-auth" id="btnConfirmarRegistro">Confirmar Registro</button>
        </form>
        <button type="button" class="btn-auth" id="btnVolverLoginRegistro">Volver al Login</button>
        <p id="authMessageRegistro" class="auth-message"></p>
      </div>
    </div>

    <div id="pantalla-inicio" style="display: none;">
      <h1 class="title">MI TIENDA</h1>
      <div class="botones-container">
        <a href="#" class="boton" id="btn-Inventario">IR AL INVENTARIO</a>
      </div>
      <button type="button" id="btnLogout" class="boton-volver">Cerrar Sesión</button>
    </div>

    <div id="pantalla-INVENTARIO" style="display: none;">
      <h1>Gestión de Mercancía</h1>
      
      <div class="inventory-header">
          <div class="inventory-actions-group">
              <div class="formulario-producto-nuevo">
                <div class="tarjeta-input-producto">
                  <h2>Añadir Producto</h2>
                  <input type="file" accept="image/*" id="inputProductoImagen" style="display: none;">
                  <button type="button" class="btn-seleccionar-imagen" id="btnSeleccionarImagen">Seleccionar Imagen</button>
                  <img id="previewProductoImagen" src="#" alt="Vista previa" style="display: none; max-width: 150px; margin: 10px auto; border-radius: 8px;">

                  <label>Nombre:</label>
                  <input type="text" id="inputNombreProducto" placeholder="Ej: Camiseta">

                  <label>Precio:</label>
                  <input type="number" id="inputPrecioProducto" placeholder="0.00">

                  <label>Cantidad:</label>
                  <input type="number" id="inputCantidadProducto" value="1">

                  <button type="button" class="btn-añadir" id="btnGuardarProducto">Guardar en la Nube</button>
                  <button type="button" class="btn-añadir btn-limpiar-formulario" id="btnLimpiarFormulario">Limpiar</button>
                </div>
              </div>

              <div class="search-summary-group">
                  <div class="search-section">
                      <h2>Buscar</h2>
                      <div class="search-input-group">
                          <input type="text" id="inputBuscarProducto" placeholder="Nombre...">
                          <button type="button" class="btn-buscar" id="btnBuscarProducto">Buscar</button>
                          <button type="button" class="btn-limpiar-busqueda" id="btnLimpiarBusqueda">X</button>
                      </div>
                  </div>
                  <div class="inventory-summary-card">
                      <h2>Total Productos</h2>
                      <p id="totalProductosCount" class="summary-count">0</p>
                  </div>
              </div>

              <div class="export-section">
                  <button type="button" id="btnExportarDatos" class="btn-exportar">Exportar Excel (CSV)</button>
              </div>
          </div>
      </div>

      <h2>Inventario Actual</h2>
      <div id="contenedorProductos" class="contenedor-productos"></div>
      <button type="button" id="btnVolverInicio" class="boton-volver">Volver al Inicio</button>
    </div>

    <template id="template-tarjeta-producto">
      <div class="tarjeta-producto">
        <img class="producto-imagen" src="#" alt="Imagen del producto">
        <h3 class="producto-nombre"></h3>
        <p class="producto-precio"></p>
        <p class="producto-cantidad"></p>
        <button type="button" class="btn-editar-producto">Editar</button>
        <button type="button" class="btn-borrar-producto">Borrar</button>
      </div>
    </template>
  </main>
  <script src="script.js"></script>
</body>
</html>
